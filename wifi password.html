<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wi-Fi 帳號密碼</title>

<style>

*{
    box-sizing: border-box;
}

body{
    margin: 0;
    font-family: "Microsoft JhengHei", Arial, sans-serif;
    background: #f4f6f9;
    color: #333;
    line-height: 1.8;
}

/* 主容器 */
.container{
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

/* 標題 */
.header{
    text-align: center;
    margin-bottom: 30px;
}

.header h1{
    margin: 0;
    font-size: 2rem;
    color: #1f3c88;
}

.header p{
    margin-top: 10px;
    color: #666;
}

/* 卡片 */
.card{
    background: white;
    border-radius: 18px;
    padding: 25px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    margin-bottom: 20px;
}

/* WiFi 標題 */
.wifi-title{
    font-size: 1.4rem;
    font-weight: bold;
    margin-bottom: 15px;
    color: #1f3c88;
}

/* 資訊區 */
.info{
    margin-bottom: 12px;
}

/* 標籤 */
.label{
    font-weight: bold;
    color: #555;
}

/* 密碼框 */
.password-box{
    display: inline-block;
    margin-top: 5px;
    padding: 10px 14px;
    background: #eef3ff;
    border-radius: 10px;
    font-family: Consolas, monospace;
    font-size: 1rem;
    color: #1f3c88;
    word-break: break-all;
}

/* 返回按鈕 */
.back-btn{
    display: inline-block;
    margin-top: 10px;
    padding: 12px 18px;
    background: #1f3c88;
    color: white;
    text-decoration: none;
    border-radius: 12px;
    transition: 0.25s;
}

.back-btn:hover{
    background: #16306d;
}

/* 手機版 */
@media (max-width: 768px){

    .container{
        padding: 14px;
    }

    .header h1{
        font-size: 1.6rem;
    }

    .wifi-title{
        font-size: 1.2rem;
    }

    .password-box{
        width: 100%;
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>📶 Wi-Fi 帳號密碼</h1>
        <p>公寓無線網路資訊</p>
    </div>

    <!-- WiFi 1 -->
    <div class="card">

        <div class="wifi-title">
            Wi-Fi 1
        </div>

        <div class="info">
            <span class="label">網路名稱 (SSID)</span><br>
            yijushih_ch
        </div>

        <div class="info">
            <span class="label">密碼</span><br>

            <div class="password-box">
                30233023@Tw
            </div>
        </div>

    </div>

    <!-- WiFi 2 -->
    <div class="card">

        <div class="wifi-title">
            Wi-Fi 2
        </div>

        <div class="info">
            <span class="label">網路名稱 (SSID)</span><br>
            yijushih_plus
        </div>

        <div class="info">
            <span class="label">密碼</span><br>

            <div class="password-box">
                30233023
            </div>
        </div>

    </div>

    <a class="back-btn" href="index.html">
        ← 返回首頁
    </a>

</div>

</body>
</html>
